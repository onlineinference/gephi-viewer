<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gephi (GEXF) Viewer</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  header { padding: 10px 14px; border-bottom: 1px solid rgba(128,128,128,.3); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .spacer { flex: 1; }
  header label, header button, header select { font-size: 13px; }
  #sigma { flex: 1; position: relative; }
  #drop-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: #888; pointer-events: none; padding: 24px; }
  #drop-hint.hidden { display: none; }
  .drag-over #sigma { outline: 3px dashed #2741e7; outline-offset: -6px; }
  #status { font-size: 12px; color: #888; }
  .err { color: #c0392b; }
  select, button { padding: 4px 8px; }

  /* Ask-the-graph chat panel */
  #main { display: flex; flex: 1; min-height: 0; }
  #chat { width: 320px; border-left: 1px solid rgba(128,128,128,.3); display: none; flex-direction: column; }
  #chat.open { display: flex; }
  #chat-log { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
  .msg { margin: 0 0 10px; padding: 8px 10px; border-radius: 8px; white-space: pre-wrap; overflow-wrap: break-word; }
  .msg.user { background: rgba(39,65,231,.12); }
  .msg.assistant { background: rgba(128,128,128,.12); }
  .msg.pending { color: #888; font-style: italic; }
  #chat-form { display: flex; gap: 6px; padding: 8px; border-top: 1px solid rgba(128,128,128,.3); }
  #chat-input { flex: 1; padding: 6px 8px; font-size: 13px; }
  #chat-empty { color: #888; font-size: 12px; padding: 4px 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Gephi (GEXF) Viewer</h1>
    <a href="./" title="Back to the monolithai site map" style="font-size:13px;text-decoration:none;">← Site map</a>
    <label>Open file: <input id="file" type="file" accept=".gexf,.xml" /></label>
    <select id="remote" title="Files from the bucket" hidden></select>
    <button id="fit">Fit</button>
    <button id="ask-toggle" title="Ask an AI questions about the loaded graph">Ask AI</button>
    <span class="spacer"></span>
    <span id="status">Drop a .gexf export here (not .gephi — export via File → Export → Graph file)</span>
  </header>
  <div id="main">
    <div id="sigma">
      <div id="drop-hint">Drag &amp; drop a Gephi <b>.gexf</b> export here<br/>— or pick one above —</div>
    </div>
    <aside id="chat">
      <div id="chat-log">
        <div id="chat-empty">Ask about the loaded graph — e.g. "which nodes are the biggest hubs?", "what connects to X?", "describe the structure".</div>
      </div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Ask about this graph…" autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </aside>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "graphology": "https://cdn.jsdelivr.net/npm/graphology@0.25.4/+esm",
    "graphology-gexf/browser": "https://cdn.jsdelivr.net/npm/graphology-gexf@0.13.1/+esm",
    "graphology-layout-forceatlas2": "https://cdn.jsdelivr.net/npm/graphology-layout-forceatlas2@0.10.1/+esm",
    "sigma": "https://cdn.jsdelivr.net/npm/sigma@3.0.0/+esm"
  }
}
</script>

<script type="module">
  import Graph from "graphology";
  import gexf from "graphology-gexf/browser";
  import forceAtlas2 from "graphology-layout-forceatlas2";
  import Sigma from "sigma";

  const el = (id) => document.getElementById(id);
  const statusEl = el("status");
  const hint = el("drop-hint");
  const container = el("sigma");
  let renderer = null;
  let currentGraph = null;
  let currentGraphLabel = "";

  const setStatus = (msg, isErr = false) => { statusEl.textContent = msg; statusEl.className = isErr ? "err" : ""; };

  // Palette used only when a node has no viz:color from Gephi.
  const PALETTE = ["#2741e7","#e74c3c","#27ae60","#f39c12","#8e44ad","#16a085","#d35400","#2c3e50"];
  const hashColor = (s) => PALETTE[Math.abs([...String(s)].reduce((a,c)=>a*31+c.charCodeAt(0)|0,7)) % PALETTE.length];

  function renderGraph(graph) {
    // Ensure every node has coords, size, color, label — re-creating Gephi's look where present,
    // and falling back to ForceAtlas2 layout + defaults where the export omitted them.
    const NODE_MIN_PX = 2, NODE_MAX_PX = 18;
    let needsLayout = false;
    let sMin = Infinity, sMax = -Infinity;
    graph.forEachNode((node, attr) => {
      if (typeof attr.x !== "number" || typeof attr.y !== "number") {
        needsLayout = true;
        graph.setNodeAttribute(node, "x", Math.random());
        graph.setNodeAttribute(node, "y", Math.random());
      }
      const s = typeof attr.size === "number" ? attr.size : 1;
      if (s < sMin) sMin = s;
      if (s > sMax) sMax = s;
      if (!attr.color) graph.setNodeAttribute(node, "color", hashColor(node));
      if (attr.label == null) graph.setNodeAttribute(node, "label", String(node));
    });
    // Gephi's viz:size is an arbitrary scale (often 10–500) sized to its own huge
    // coordinate space; sigma treats size as on-screen pixels, so raw values render
    // as giant overlapping blobs. Remap to a pixel range, preserving the hierarchy.
    const sSpan = sMax - sMin;
    graph.forEachNode((node, attr) => {
      const s = typeof attr.size === "number" ? attr.size : 1;
      const t = sSpan > 0 ? (s - sMin) / sSpan : 0.5;
      graph.setNodeAttribute(node, "size", NODE_MIN_PX + t * (NODE_MAX_PX - NODE_MIN_PX));
    });

    // Same story for edges: keep them thin so dense graphs stay legible.
    let wMin = Infinity, wMax = -Infinity;
    graph.forEachEdge((edge, attr) => {
      const w = typeof attr.weight === "number" ? attr.weight : (typeof attr.size === "number" ? attr.size : 1);
      if (w < wMin) wMin = w;
      if (w > wMax) wMax = w;
    });
    const wSpan = wMax - wMin;
    graph.forEachEdge((edge, attr) => {
      const w = typeof attr.weight === "number" ? attr.weight : (typeof attr.size === "number" ? attr.size : 1);
      const t = wSpan > 0 ? (w - wMin) / wSpan : 0.5;
      graph.setEdgeAttribute(edge, "size", 0.3 + t * 1.7);
      if (!attr.color) graph.setEdgeAttribute(edge, "color", "rgba(140,140,140,0.35)");
    });

    if (needsLayout) {
      // Only run layout when Gephi coordinates were absent.
      const iters = Math.min(400, Math.max(80, Math.round(6000 / Math.max(1, graph.order))));
      forceAtlas2.assign(graph, { iterations: iters, settings: forceAtlas2.inferSettings(graph) });
    }

    if (renderer) renderer.kill();
    currentGraph = graph;
    renderer = new Sigma(graph, container, {
      renderLabels: true,
      labelDensity: 0.3,
      labelRenderedSizeThreshold: 6,
      defaultEdgeColor: "rgba(140,140,140,0.35)",
    });
    // Hover: emphasize the node's neighborhood.
    renderer.on("enterNode", ({ node }) => {
      const neighbors = new Set(graph.neighbors(node)); neighbors.add(node);
      renderer.setSetting("nodeReducer", (n, data) => neighbors.has(n) ? data : { ...data, color: "#dddddd", label: "" });
      renderer.setSetting("edgeReducer", (e, data) =>
        graph.extremities(e).some((x) => neighbors.has(x)) ? data : { ...data, hidden: true });
    });
    renderer.on("leaveNode", () => { renderer.setSetting("nodeReducer", null); renderer.setSetting("edgeReducer", null); });

    hint.classList.add("hidden");
    setStatus(`${graph.order} nodes · ${graph.size} edges${needsLayout ? " · layout: ForceAtlas2 (no coords in file)" : " · layout: from Gephi"}`);
  }

  function loadFromText(text, label) {
    try {
      const graph = gexf.parse(Graph, text, { addMissingNodes: true });
      currentGraphLabel = label || "";
      renderGraph(graph);
      if (label) setStatus(`${label} — ${graph.order} nodes · ${graph.size} edges`);
    } catch (e) {
      console.error(e);
      setStatus("Could not parse that file — is it a valid Gephi .gexf export? " + e.message, true);
    }
  }

  // 1) File picker
  el("file").addEventListener("change", (ev) => {
    const f = ev.target.files[0]; if (!f) return;
    setStatus(`Loading ${f.name}…`);
    f.text().then((t) => loadFromText(t, f.name));
  });

  // 2) Drag & drop
  const app = el("app");
  ["dragenter","dragover"].forEach((t) => app.addEventListener(t, (e) => { e.preventDefault(); app.classList.add("drag-over"); }));
  ["dragleave","drop"].forEach((t) => app.addEventListener(t, (e) => { e.preventDefault(); app.classList.remove("drag-over"); }));
  app.addEventListener("drop", (e) => {
    const f = e.dataTransfer.files[0]; if (!f) return;
    setStatus(`Loading ${f.name}…`);
    f.text().then((t) => loadFromText(t, f.name));
  });

  // 3) Fit / reset camera
  el("fit").addEventListener("click", () => { if (renderer) renderer.getCamera().animatedReset(); });

  // 4) Load from a URL (R2/bucket) via ?gexf=<url>
  const params = new URLSearchParams(location.search);
  const remoteUrl = params.get("gexf");
  if (remoteUrl) {
    setStatus(`Fetching ${remoteUrl}…`);
    fetch(remoteUrl).then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then((t) => loadFromText(t, remoteUrl))
      .catch((e) => setStatus("Fetch failed: " + e.message + " (check the file URL / CORS)", true));
  }

  // 5) Optional: populate a dropdown from a bucket index (a Worker that returns JSON: [{name,url}]).
  //    Set ?index=<url-to-json>. Left here so the deployed version can list R2 files.
  const indexUrl = params.get("index");
  if (indexUrl) {
    fetch(indexUrl).then((r) => r.json()).then((items) => {
      const sel = el("remote"); sel.hidden = false;
      sel.innerHTML = '<option value="">— pick a file —</option>' +
        items.map((i) => `<option value="${i.url}">${i.name}</option>`).join("");
      sel.addEventListener("change", () => { if (sel.value) { setStatus("Fetching…"); fetch(sel.value).then((r)=>r.text()).then((t)=>loadFromText(t, sel.value)); } });
    }).catch((e) => console.warn("index load failed", e));
  }

  // 6) "Ask AI" — build a text digest of the loaded graph and send it, plus the
  //    question, to the Worker's /api/ask (Workers AI). Everything the model sees
  //    is computed here from the real graph, so answers stay grounded.
  // The viewer is hosted on GitHub Pages, so default to the Worker's own domain.
  const ASK_URL = params.get("ask") || "https://gephi-viewer-worker.dave-9fd.workers.dev/api/ask";

  function buildDigest(graph, question) {
    const lines = [];
    const label = (n) => graph.getNodeAttribute(n, "label") ?? String(n);
    const directed = graph.type === "directed" || graph.type === "mixed";

    lines.push(`File: ${currentGraphLabel || "(local file)"}`);
    lines.push(`Type: ${graph.type} · Nodes: ${graph.order} · Edges: ${graph.size}`);
    if (graph.order > 1) {
      const density = (2 * graph.size) / (graph.order * (graph.order - 1));
      lines.push(`Avg degree: ${(2 * graph.size / graph.order).toFixed(2)} · Density: ${density.toFixed(4)}`);
    }

    // Node attribute keys (sampled) so the model knows what metadata exists.
    const attrKeys = new Set();
    let sampled = 0;
    graph.forEachNode((n, a) => {
      if (sampled++ < 50) Object.keys(a).forEach((k) => attrKeys.add(k));
    });
    lines.push(`Node attributes: ${[...attrKeys].join(", ")}`);

    // Top hubs by degree.
    const byDegree = graph.nodes()
      .map((n) => ({ n, d: graph.degree(n) }))
      .sort((a, b) => b.d - a.d);
    lines.push("", "Top 25 nodes by degree:");
    byDegree.slice(0, 25).forEach(({ n, d }) => {
      const io = directed ? ` (in ${graph.inDegree(n)}, out ${graph.outDegree(n)})` : "";
      lines.push(`- ${label(n)}: degree ${d}${io}`);
    });

    // Isolated nodes count.
    const isolated = byDegree.filter((x) => x.d === 0).length;
    if (isolated) lines.push(`Isolated nodes (degree 0): ${isolated}`);

    // Nodes whose labels match words from the question, with their neighbors —
    // this is what lets the model answer "what links to X?".
    const words = (question.toLowerCase().match(/[a-z0-9][a-z0-9._/-]{2,}/g) || [])
      .filter((w) => !["the","and","what","which","who","how","are","node","nodes","graph","most","does","with","that","this","about","between","connected","connects","link","links"].includes(w));
    if (words.length) {
      const matches = [];
      for (const n of graph.nodes()) {
        const l = label(n).toLowerCase();
        if (words.some((w) => l.includes(w))) {
          matches.push(n);
          if (matches.length >= 15) break;
        }
      }
      if (matches.length) {
        lines.push("", "Nodes matching the question, with neighbors:");
        for (const n of matches) {
          const neighbors = graph.neighbors(n).slice(0, 12).map(label).join(", ");
          const more = graph.degree(n) > 12 ? `, … (${graph.degree(n)} total)` : "";
          lines.push(`- ${label(n)} (degree ${graph.degree(n)}) -> ${neighbors || "(no neighbors)"}${more}`);
        }
      }
    }

    // If the graph is small, include the full edge list — the model can then
    // answer path/structure questions exactly.
    if (graph.size <= 300) {
      lines.push("", "Full edge list:");
      graph.forEachEdge((e, attr, s, t) => {
        lines.push(`${label(s)} ${directed ? "->" : "--"} ${label(t)}`);
      });
    }

    return lines.join("\n").slice(0, 15000);
  }

  const chat = el("chat"), chatLog = el("chat-log"), chatInput = el("chat-input");
  const chatHistory = [];

  el("ask-toggle").addEventListener("click", () => {
    chat.classList.toggle("open");
    if (chat.classList.contains("open")) chatInput.focus();
    if (renderer) renderer.refresh();
  });

  function addMsg(role, text, pending = false) {
    const div = document.createElement("div");
    div.className = `msg ${role}${pending ? " pending" : ""}`;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
    return div;
  }

  el("chat-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = chatInput.value.trim();
    if (!question) return;
    if (!currentGraph) { addMsg("assistant", "Load a .gexf file first, then ask away."); return; }

    chatInput.value = "";
    addMsg("user", question);
    const pendingMsg = addMsg("assistant", "Thinking…", true);

    try {
      const res = await fetch(ASK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          digest: buildDigest(currentGraph, question),
          history: chatHistory.slice(-8),
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      pendingMsg.classList.remove("pending");
      pendingMsg.textContent = data.answer || "(empty answer)";
      chatHistory.push({ role: "user", content: question }, { role: "assistant", content: data.answer || "" });
    } catch (err) {
      pendingMsg.classList.remove("pending");
      pendingMsg.classList.add("err");
      pendingMsg.textContent = "Ask failed: " + err.message;
    }
  });
</script>
</body>
</html>
